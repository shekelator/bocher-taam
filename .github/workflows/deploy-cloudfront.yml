name: Deploy to CloudFront

on:
  push:
    branches:
      - main
      - more-features
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  BUCKET_PREFIX: bocher-taam
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Validate deployment configuration
        run: |
          test -n "${AWS_REGION}" || { echo "Missing repository variable AWS_REGION"; exit 1; }
          test -n "${AWS_ROLE_TO_ASSUME}" || { echo "Missing repository variable AWS_ROLE_TO_ASSUME"; exit 1; }
          test -n "${S3_BUCKET}" || { echo "Missing repository variable S3_BUCKET"; exit 1; }
          test -n "${CLOUDFRONT_DISTRIBUTION_ID}" || { echo "Missing repository variable CLOUDFRONT_DISTRIBUTION_ID"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static assets
        run: |
          aws s3 sync build/ "s3://${S3_BUCKET}/${BUCKET_PREFIX}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp build/index.html "s3://${S3_BUCKET}/${BUCKET_PREFIX}/index.html" \
            --cache-control "public,max-age=0,s-maxage=0,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/*"
